<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Recover Password | Revature PM</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

	<style>
		body {
			margin: 0;
			font-family: 'Segoe UI', system-ui, sans-serif;
			background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.split-container {
			width: 95%;
			max-width: 1200px;
			height: 85vh;
			display: flex;
			border-radius: 20px;
			overflow: hidden;
			box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
		}


		.left-panel {
			flex: 1;
			position: relative;
			color: white;
			display: flex;
			flex-direction: column;
			justify-content: center;
			padding: 120px 60px 60px 60px;
			background: url('https://t4.ftcdn.net/jpg/10/87/56/33/240_F_1087563377_IWMuTjIt8qxlmISGjKPXmoGW17BFbKvz.jpg') no-repeat center;
			background-size: contain;
			background-color: #081b29;
		}

		.left-panel::before {
			content: "";
			position: absolute;
			inset: 0;
			background: linear-gradient(135deg, rgba(0, 0, 0, 0.85), rgba(0, 60, 80, 0.8));
		}

		.left-panel>* {
			position: relative;
			z-index: 1;
		}

		.left-panel h1 {
			font-size: 2rem;
			font-weight: 700;
		}

		.left-panel p {
			font-size: 0.95rem;
			opacity: 0.85;
			margin-top: 15px;
		}

		.left-panel ul {
			list-style: none;
			padding: 0;
			margin-top: 20px;
		}

		.left-panel ul li {
			margin-bottom: 10px;
			display: flex;
			align-items: center;
			gap: 8px;
			font-size: 0.9rem;
		}

		.right-panel {
			flex: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			background: rgba(255, 255, 255, 0.05);
			backdrop-filter: blur(30px);
		}

		.recover-card {
			width: 100%;
			max-width: 460px;
			padding: 30px;
			border-radius: 16px;
			background: rgba(20, 35, 50, 0.92);
			color: #ffffff;
			box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
			max-height: 80vh;
			overflow-y: auto;
		}

		.recover-card::-webkit-scrollbar {
			width: 6px;
		}

		.recover-card::-webkit-scrollbar-thumb {
			background: #0072ff;
			border-radius: 10px;
		}

		.form-label {
			font-size: 0.85rem;
			margin-bottom: 4px;
		}

		.form-control {
			border-radius: 10px;
			padding: 8px 12px;
			font-size: 0.85rem;
			border: 1px solid rgba(255, 255, 255, 0.15);
			background: rgba(255, 255, 255, 0.08);
			color: #ffffff;
		}

		.form-control::placeholder {
			color: #cbd5e1;
		}

		.form-control:focus {
			border-color: #00c6ff;
			box-shadow: 0 0 0 2px rgba(0, 198, 255, 0.3);
			background: rgba(255, 255, 255, 0.12);
			color: #ffffff;
		}

		.question-block {
			background: rgba(255, 255, 255, 0.08);
			padding: 12px;
			border-radius: 12px;
			margin-bottom: 12px;
		}

		.btn-primary,
		.btn-success {
			border-radius: 10px;
			padding: 8px;
			font-size: 0.9rem;
			background: linear-gradient(135deg, #00c6ff, #0072ff);
			border: none;
		}

		.btn-primary:hover,
		.btn-success:hover {
			transform: translateY(-2px);
			box-shadow: 0 8px 20px rgba(0, 114, 255, 0.4);
		}

		.alert {
			border-radius: 10px;
		}

		.back-login {
			font-size: 0.85rem;
			color: #cbd5e1;
			text-decoration: none;
		}

		.back-login:hover {
			color: #00c6ff;
		}

		@media (max-width: 992px) {
			.split-container {
				flex-direction: column;
				height: auto;
			}

			body {
				padding: 30px 0;
			}
		}

		/* TOP CENTER LARGE LOGO */
		.hero-logo {
			position: absolute;
			top: 23px;
			left: 50%;
			transform: translateX(-50%);
		}

		.hero-logo-img {
			width: 140px;
			height: auto;
			transition: transform 0.3s ease;
		}

		.hero-logo-img:hover {
			transform: scale(1.05);
		}

		@media (max-width: 992px) {

			.split-container {
				flex-direction: column;
				height: auto;
			}

			.left-panel {
				position: relative;
				padding: 80px 30px 40px 30px;
				text-align: center;
				background-size: cover;
			}

			.left-panel h1 {
				font-size: 1.6rem;
			}

			.left-panel p {
				font-size: 0.9rem;
			}

			.feature-list {
				padding-left: 0;
				text-align: left;
				max-width: 320px;
				margin: 20px auto 0 auto;
			}

			.hero-logo {
				position: static;
				transform: none;
				margin-bottom: 20px;
			}

			.hero-logo-img {
				width: 110px;
			}
		}
	</style>

	<script>
		async function fetchQuestions() {

			const username = document.getElementById("username").value.trim();
			const errorBox = document.getElementById("errorBox");
			errorBox.classList.add("d-none");

			if (!username) {
				showError("Username or Email is required.");
				return;
			}

			try {
				const response = await fetch(
					"http://localhost:8080/api/auth/recover/questions?usernameOrEmail="
					+ encodeURIComponent(username)
				);

				if (!response.ok) {
					showError("User does not exist.");
					return;
				}

				const questions = await response.json();
				const container = document.getElementById("questionsContainer");
				container.innerHTML = "";

				questions.forEach((q, index) => {
					container.innerHTML += `
	                <div class="question-block">
	                    <label class="form-label fw-semibold">${q}</label>

	                    <input type="hidden"
	                           name="securityAnswers[${index}].question"
	                           value="${q}">

	                    <input type="text"
	                           name="securityAnswers[${index}].answer"
	                           class="form-control answer-input"
	                           placeholder="Your Answer">
	                </div>
	            `;
				});

				document.getElementById("questionSection")
					.classList.remove("d-none");

			} catch (error) {
				showError("Server connection error.");
			}
		}

		function showError(message) {
			const errorBox = document.getElementById("errorBox");
			errorBox.innerText = message;
			errorBox.classList.remove("d-none");
		}

		function togglePassword() {
			const input = document.getElementById("newPassword");
			const icon = document.getElementById("eyeIcon");

			if (input.type === "password") {
				input.type = "text";
				icon.classList.replace("bi-eye", "bi-eye-slash");
			} else {
				input.type = "password";
				icon.classList.replace("bi-eye-slash", "bi-eye");
			}
		}

		document.addEventListener("DOMContentLoaded", function () {

			const form = document.getElementById("recoverForm");

			form.addEventListener("submit", function (e) {

				const username = document.getElementById("username").value.trim();
				const password = document.getElementById("newPassword");
				const answers = document.querySelectorAll(".answer-input");

				if (!username) {
					e.preventDefault();
					showError("Username or Email is required.");
					return;
				}

				if (!password || password.value.trim() === "") {
					e.preventDefault();
					showError("New Master Password is required.");
					return;
				}

				for (let i = 0; i < answers.length; i++) {
					if (answers[i].value.trim() === "") {
						e.preventDefault();
						showError("All security answers must be filled.");
						return;
					}
				}

			});

		});
	</script>

</head>

<body>

	<div class="split-container">

		<div class="left-panel">
			<div class="hero-logo">
				<a th:href="@{/login}">
					<img th:src="@{/images/logo.png}" alt="Revature Password Manager" class="hero-logo-img">
				</a>
			</div>
			<h1>Password Recovery</h1>
			<p>Verify your identity using your security questions and securely reset your master password.</p>
			<ul>
				<li><i class="bi bi-shield-check"></i> Secure Identity Verification</li>
				<li><i class="bi bi-key"></i> Reset Master Password</li>
				<li><i class="bi bi-lock"></i> Encrypted Protection</li>
			</ul>
		</div>

		<div class="right-panel">
			<div class="recover-card">

				<div class="text-center mb-4">
					<i class="bi bi-unlock-fill text-info" style="font-size: 36px;"></i>
					<h4 class="fw-bold mt-3">Recover Master Password</h4>
					<small>Verify security questions</small>
				</div>

				<div id="errorBox" class="alert alert-danger text-center d-none"></div>

				<div th:if="${successMessage}" class="alert alert-success text-center">
					<span th:text="${successMessage}"></span>
				</div>

				<div th:if="${errorMessage}" class="alert alert-danger text-center">
					<span th:text="${errorMessage}"></span>
				</div>

				<form method="post" action="/recover" novalidate id="recoverForm">

					<div class="mb-3">
						<label class="form-label">Username or Email</label>
						<div class="input-group">
							<input type="text" id="username" name="usernameOrEmail" class="form-control">
							<button type="button" class="btn btn-primary" onclick="fetchQuestions()">Next</button>
						</div>
					</div>

					<div id="questionSection" class="d-none">

						<hr>

						<div id="questionsContainer"></div>

						<div class="mb-3">
							<label class="form-label">New Master Password</label>
							<div class="input-group">
								<input type="password" id="newPassword" name="newPassword" class="form-control">
								<button type="button" class="btn btn-outline-light" onclick="togglePassword()">
									<i id="eyeIcon" class="bi bi-eye"></i>
								</button>
							</div>
						</div>

						<button type="submit" class="btn btn-success w-100">
							Reset Password
						</button>

					</div>

				</form>

				<div class="text-center mt-3">
					<a href="/login" class="back-login">← Back to Login</a>
				</div>

			</div>
		</div>

	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
