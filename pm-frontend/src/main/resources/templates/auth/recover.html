<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Recover Password | Revature PM</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

	<style>
		body {
			margin: 0;
			font-family: 'Segoe UI', system-ui, sans-serif;
			overflow-x: hidden;
		}

		.split-container {
			min-height: 100vh;
			display: flex;
		}

		.left-panel {
			flex: 1;
			color: white;
			padding: 70px;
			display: flex;
			flex-direction: column;
			justify-content: center;
			background: linear-gradient(-45deg, #ff512f, #dd2476, #1e3c72, #2a5298);
			background-size: 400% 400%;
			animation: gradientMove 12s ease infinite;
		}

		@keyframes gradientMove {
			0% {
				background-position: 0% 50%;
			}

			50% {
				background-position: 100% 50%;
			}

			100% {
				background-position: 0% 50%;
			}
		}

		.left-panel h1 {
			font-size: 38px;
			font-weight: 700;
		}

		.left-panel p {
			margin-top: 20px;
			font-size: 17px;
			opacity: 0.9;
		}

		.left-panel ul {
			margin-top: 30px;
			padding-left: 0;
		}

		.left-panel li {
			list-style: none;
			margin-bottom: 14px;
		}

		.right-panel {
			flex: 1;
			background: #f8f9fa;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.recover-card {
			width: 100%;
			max-width: 480px;
			border-radius: 20px;
			padding: 40px;
			background: white;
			box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
			animation: fadeUp 0.6s ease;
		}

		@keyframes fadeUp {
			from {
				opacity: 0;
				transform: translateY(30px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		.form-control {
			border-radius: 10px;
		}

		.btn-primary,
		.btn-success {
			border-radius: 10px;
			font-weight: 600;
		}

		.alert {
			border-radius: 10px;
		}

		.question-block {
			background: #f1f3f7;
			padding: 15px;
			border-radius: 12px;
			margin-bottom: 15px;
		}

		@media (max-width: 768px) {
			.split-container {
				flex-direction: column;
			}

			.left-panel {
				padding: 40px 20px;
				text-align: center;
			}
		}
	</style>

	<script>
		async function fetchQuestions() {

			const username = document.getElementById("username").value.trim();
			const errorBox = document.getElementById("errorBox");
			errorBox.classList.add("d-none");

			if (!username) {
				showError("Please enter username or email.");
				return;
			}

			try {
				const response = await fetch(
					"http://localhost:8080/api/auth/recover/questions?usernameOrEmail="
					+ encodeURIComponent(username)
				);

				if (!response.ok) {
					showError("User does not exist.");
					return;
				}

				const questions = await response.json();
				const container = document.getElementById("questionsContainer");
				container.innerHTML = "";

				questions.forEach((q, index) => {
					container.innerHTML += `
                        <div class="question-block">
                            <label class="form-label fw-semibold">${q}</label>

                            <input type="hidden"
                                   name="securityAnswers[${index}].question"
                                   value="${q}">

                            <input type="text"
                                   name="securityAnswers[${index}].answer"
                                   class="form-control"
                                   placeholder="Your Answer"
                                   required>
                        </div>
                    `;
				});

				document.getElementById("questionSection")
					.classList.remove("d-none");

			} catch (error) {
				showError("Server connection error.");
			}
		}

		function showError(message) {
			const errorBox = document.getElementById("errorBox");
			errorBox.innerText = message;
			errorBox.classList.remove("d-none");
		}

		function togglePassword() {
			const input = document.getElementById("newPassword");
			const icon = document.getElementById("eyeIcon");

			if (input.type === "password") {
				input.type = "text";
				icon.classList.replace("bi-eye", "bi-eye-slash");
			} else {
				input.type = "password";
				icon.classList.replace("bi-eye-slash", "bi-eye");
			}
		}
	</script>
</head>

<body>

	<div class="split-container">

		<!-- LEFT PANEL -->
		<div class="left-panel">

			<h1>Password Recovery</h1>

			<p>
				Verify your identity using your security questions
				and securely reset your master password.
			</p>

			<ul>
				<li><i class="bi bi-shield-check"></i> Secure Identity Verification</li>
				<li><i class="bi bi-key"></i> Reset Master Password</li>
				<li><i class="bi bi-lock"></i> Encrypted Protection</li>
			</ul>

		</div>

		<!-- RIGHT PANEL -->
		<div class="right-panel">

			<div class="recover-card">

				<div class="text-center mb-4">
					<i class="bi bi-unlock-fill text-warning" style="font-size: 40px;"></i>
					<h4 class="fw-bold mt-3">Recover Master Password</h4>
					<small class="text-muted">Verify security questions</small>
				</div>

				<!-- Dynamic JS Error -->
				<div id="errorBox" class="alert alert-danger text-center d-none"></div>

				<!-- Backend Success -->
				<div th:if="${successMessage}" class="alert alert-success text-center">
					<span th:text="${successMessage}"></span>
				</div>

				<!-- Backend Error -->
				<div th:if="${errorMessage}" class="alert alert-danger text-center">
					<span th:text="${errorMessage}"></span>
				</div>

				<form method="post" action="/recover">

					<div class="mb-3">
						<label class="form-label">Username or Email</label>
						<div class="input-group">
							<input type="text" id="username" name="usernameOrEmail" class="form-control" required>

							<button type="button" class="btn btn-primary" onclick="fetchQuestions()">
								Next
							</button>
						</div>
					</div>

					<div id="questionSection" class="d-none">

						<hr>

						<div id="questionsContainer"></div>

						<div class="mb-3">
							<label class="form-label">New Master Password</label>

							<div class="input-group">
								<input type="password" id="newPassword" name="newPassword" class="form-control"
									required>

								<button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
									<i id="eyeIcon" class="bi bi-eye"></i>
								</button>
							</div>
						</div>

						<button type="submit" class="btn btn-success w-100">
							Reset Password
						</button>

					</div>

				</form>

				<div class="text-center mt-3">
					<a href="/login" class="text-decoration-none">
						← Back to Login
					</a>
				</div>

			</div>

		</div>

	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
