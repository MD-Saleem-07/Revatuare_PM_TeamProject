<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/main :: layout(~{::section})}">

<section>

	<div class="d-flex justify-content-between align-items-center mb-4">
		<div>
			<h2 class="fw-bold mb-1">Edit Password</h2>
			<p class="text-muted mb-0">
				Update your stored credentials securely
			</p>
		</div>

		<a href="/vault" class="btn btn-outline-secondary">
			<i class="bi bi-arrow-left"></i> Back to Vault
		</a>
	</div>

	<div class="card p-4">

		<form th:action="@{/vault/edit}" method="post">

			<input type="hidden" name="id" th:value="${password.id}" />

			<div class="row g-4">

				<div class="col-md-6">
					<label class="form-label fw-semibold">Account Name</label>
					<input type="text" name="accountName" class="form-control" th:value="${password.accountName}"
						required>
				</div>

				<div class="col-md-6">
					<label class="form-label fw-semibold">Website URL</label>
					<input type="text" name="websiteUrl" class="form-control" th:value="${password.websiteUrl}">
				</div>

				<div class="col-md-6">
					<label class="form-label fw-semibold">Login Username</label>
					<input type="text" name="loginUsername" class="form-control" th:value="${password.loginUsername}"
						required>
				</div>

				<div class="col-md-6">
					<label class="form-label fw-semibold">Password</label>

					<div class="input-group">
						<input type="password" id="passwordField" name="password" class="form-control"
							placeholder="Enter new password" required>

						<button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
							<i id="eyeIcon" class="bi bi-eye"></i>
						</button>
					</div>
				</div>

				<div class="col-md-6">
					<label class="form-label fw-semibold">Category</label>

					<select name="category" class="form-select">

						<option value="">Select Category</option>

						<option value="Social" th:selected="${password.category == 'Social'}">
							Social
						</option>

						<option value="Email" th:selected="${password.category == 'Email'}">
							Email
						</option>

						<option value="Banking" th:selected="${password.category == 'Banking'}">
							Banking
						</option>

						<option value="Shopping" th:selected="${password.category == 'Shopping'}">
							Shopping
						</option>

						<option value="Work" th:selected="${password.category == 'Work'}">
							Work
						</option>

						<option value="Entertainment" th:selected="${password.category == 'Entertainment'}">
							Entertainment
						</option>

						<option value="Other" th:selected="${password.category == 'Other'}">
							Other
						</option>

					</select>
				</div>

				<div class="col-12">
					<label class="form-label fw-semibold">Notes</label>

					<textarea name="notes" class="form-control" rows="4" th:text="${password.notes}"></textarea>
				</div>

			</div>

			<div class="mt-5 d-flex justify-content-end gap-3">

				<a href="/vault" class="btn btn-outline-secondary px-4">
					Cancel
				</a>

				<button type="submit" class="btn btn-primary px-4">
					<i class="bi bi-pencil-square me-1"></i>
					Update Password
				</button>

			</div>

		</form>

	</div>

	<script>
		function togglePassword() {
			const field = document.getElementById("passwordField");
			const icon = document.getElementById("eyeIcon");

			if (field.type === "password") {
				field.type = "text";
				icon.classList.remove("bi-eye");
				icon.classList.add("bi-eye-slash");
			} else {
				field.type = "password";
				icon.classList.remove("bi-eye-slash");
				icon.classList.add("bi-eye");
			}
		}
	</script>

</section>

</html>
