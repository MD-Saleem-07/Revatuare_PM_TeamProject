<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/main :: layout(~{::section})}">

<section>

	<div class="d-flex justify-content-between align-items-center mb-4">
		<div>
			<h2 class="fw-bold mb-1">Add New Password</h2>
			<p class="text-muted mb-0">
				Store credentials securely in your encrypted vault
			</p>
		</div>

		<a href="/vault" class="btn btn-outline-secondary">
			<i class="bi bi-arrow-left"></i> Back to Vault
		</a>
	</div>

	<div class="card p-4">

		<form th:action="@{/vault/add}" method="post">

			<div class="row g-4">

				<div class="col-md-6">
					<label class="form-label fw-semibold">Account Name</label>
					<input type="text" name="accountName" class="form-control" placeholder="e.g. Gmail, Facebook"
						required>
				</div>

				<div class="col-md-6">
					<label class="form-label fw-semibold">Login Username</label>
					<input type="text" name="loginUsername" class="form-control" placeholder="Enter login username"
						required>
				</div>

				<div class="col-md-6">
					<label class="form-label fw-semibold">Website URL</label>
					<input type="text" name="websiteUrl" class="form-control" placeholder="https://example.com">
				</div>

				<div class="col-md-6">
					<label class="form-label fw-semibold">Password</label>

					<div class="input-group">
						<input type="password" id="passwordField" name="password" class="form-control"
							placeholder="Enter secure password" required>

						<button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
							<i id="eyeIcon" class="bi bi-eye"></i>
						</button>
					</div>
				</div>

				<div class="col-md-6">
					<label class="form-label fw-semibold">Category</label>
					<select name="category" class="form-select">
						<option value="">Select Category</option>
						<option>Social</option>
						<option>Email</option>
						<option>Banking</option>
						<option>Shopping</option>
						<option>Work</option>
						<option>Entertainment</option>
						<option>Other</option>
					</select>
				</div>

				<!-- Notes -->
				<div class="col-12">
					<label class="form-label fw-semibold">Notes</label>
					<textarea name="notes" class="form-control" rows="4" placeholder="Optional notes...">
                    </textarea>
				</div>

			</div>

			<div class="mt-5 d-flex justify-content-end gap-3">

				<a href="/vault" class="btn btn-outline-secondary px-4">
					Cancel
				</a>

				<button type="submit" class="btn btn-success px-4">
					<i class="bi bi-save me-1"></i>
					Save Password
				</button>

			</div>

		</form>

	</div>


	<script>
		function togglePassword() {

			const field = document.getElementById("passwordField");
			const icon = document.getElementById("eyeIcon");

			if (field.type === "password") {
				field.type = "text";
				icon.classList.remove("bi-eye");
				icon.classList.add("bi-eye-slash");
			} else {
				field.type = "password";
				icon.classList.remove("bi-eye-slash");
				icon.classList.add("bi-eye");
			}
		}
	</script>

</section>

</html>
