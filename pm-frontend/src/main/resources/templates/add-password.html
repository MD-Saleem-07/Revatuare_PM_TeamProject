<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/main :: layout(~{::section})}">

<section>

	<div class="d-flex justify-content-between align-items-center mb-4">
		<div>
			<h2 class="fw-bold mb-1">Add New Password</h2>
			<p class="text-muted mb-0">
				Store credentials securely in your encrypted vault
			</p>
		</div>

		<a href="/vault" class="btn btn-outline-secondary">
			<i class="bi bi-arrow-left"></i> Back to Vault
		</a>
	</div>

	<div class="card p-4">

		<form th:action="@{/vault/add}" method="post" novalidate id="addPasswordForm">

			<div class="row g-4">

				<div class="col-md-6">
					<label class="form-label fw-semibold">Account Name</label>
					<input type="text" name="accountName" id="accountName" class="form-control"
						placeholder="e.g. Gmail, Facebook">
					<div class="text-danger small" id="accountNameError"></div>
				</div>

				<div class="col-md-6">
					<label class="form-label fw-semibold">Login Username</label>
					<input type="text" name="loginUsername" id="loginUsername" class="form-control"
						placeholder="Enter login username">
					<div class="text-danger small" id="loginUsernameError"></div>
				</div>

				<div class="col-md-6">
					<label class="form-label fw-semibold">Website URL</label>
					<input type="text" name="websiteUrl" id="websiteUrl" class="form-control"
						placeholder="https://example.com">
					<div class="text-danger small" id="websiteUrlError"></div>
				</div>

				<div class="col-md-6">
					<label class="form-label fw-semibold">Password</label>

					<div class="input-group">
						<input type="password" id="passwordField" name="password" class="form-control"
							placeholder="Enter secure password">
						<button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
							<i id="eyeIcon" class="bi bi-eye"></i>
						</button>
					</div>
					<div class="text-danger small" id="passwordError"></div>
				</div>

				<div class="col-md-6">
					<label class="form-label fw-semibold">Category</label>
					<select name="category" id="category" class="form-select">
						<option value="">Select Category</option>
						<option>Social</option>
						<option>Email</option>
						<option>Banking</option>
						<option>Shopping</option>
						<option>Work</option>
						<option>Entertainment</option>
						<option>Other</option>
					</select>
					<div class="text-danger small" id="categoryError"></div>
				</div>

				<!-- Notes -->
				<div class="col-12">
					<label class="form-label fw-semibold">Notes</label>
					<textarea name="notes" class="form-control" rows="4" placeholder="Optional notes...">
                    </textarea>
				</div>

			</div>

			<div class="mt-5 d-flex justify-content-end gap-3">

				<a href="/vault" class="btn btn-outline-secondary px-4">
					Cancel
				</a>

				<button type="submit" class="btn btn-success px-4">
					<i class="bi bi-save me-1"></i>
					Save Password
				</button>

			</div>

		</form>

	</div>


	<script>
		function togglePassword() {

			const field = document.getElementById("passwordField");
			const icon = document.getElementById("eyeIcon");

			if (field.type === "password") {
				field.type = "text";
				icon.classList.remove("bi-eye");
				icon.classList.add("bi-eye-slash");
			} else {
				field.type = "password";
				icon.classList.remove("bi-eye-slash");
				icon.classList.add("bi-eye");
			}
		}

		document.getElementById("addPasswordForm")
			.addEventListener("submit", function (e) {

				let valid = true;

				// Clear previous errors
				document.getElementById("accountNameError").innerText = "";
				document.getElementById("loginUsernameError").innerText = "";
				document.getElementById("passwordError").innerText = "";
				document.getElementById("websiteUrlError").innerText = "";
				document.getElementById("categoryError").innerText = "";

				const accountName = document.getElementById("accountName");
				const loginUsername = document.getElementById("loginUsername");
				const websiteUrl = document.getElementById("websiteUrl");
				const category = document.getElementById("category");
				const password = document.getElementById("passwordField");

				// Account Name validation
				if (accountName.value.trim() === "") {
					document.getElementById("accountNameError").innerText =
						"Account Name is required.";
					accountName.classList.add("is-invalid");
					valid = false;
				} else {
					accountName.classList.remove("is-invalid");
				}

				// Login Username validation
				if (loginUsername.value.trim() === "") {
					document.getElementById("loginUsernameError").innerText =
						"Login Username is required.";
					loginUsername.classList.add("is-invalid");
					valid = false;
				} else {
					loginUsername.classList.remove("is-invalid");
				}
				// Website URL validation
				if (websiteUrl.value.trim() === "") {
					document.getElementById("websiteUrlError").innerText =
						"Website URL is required.";
					websiteUrl.classList.add("is-invalid");
					valid = false;
				} else {
					websiteUrl.classList.remove("is-invalid");
				}
				// Category validation
				if (category.value.trim() === "") {
					document.getElementById("categoryError").innerText =
						"Category is required.";
					category.classList.add("is-invalid");
					valid = false;
				} else {
					category.classList.remove("is-invalid");
				}

				if (password.value.trim().length < 8 ||
					password.value.trim().length > 64) {

					document.getElementById("passwordError").innerText =
						"Password must be between 8 and 64 characters.";

					password.classList.add("is-invalid");
					valid = false;

				} else {
					password.classList.remove("is-invalid");
				}

				if (!valid) {
					e.preventDefault();
				}

			});
	</script>

</section>

</html>
