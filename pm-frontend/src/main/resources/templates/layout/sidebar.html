<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

	<div th:fragment="sidebar" class="sidebar-wrapper d-flex flex-column justify-content-between h-100 px-3 py-4">

		<div>

			<div class="user-card p-3 mb-4 rounded-3">

				<div class="d-flex align-items-center">

					<div class="avatar-wrapper">

						<div class="avatar">

							<div class="avatar-letter-circle">

								<span class="avatar-letter"
									th:text="${#strings.substring(session.USERNAME,0,1).toUpperCase()}">
									U
								</span>

							</div>

						</div>

						<span class="status-dot"></span>

					</div>

					<div class="ms-3 flex-grow-1">
						<div class="username-text" th:text="${session.USERNAME}">
							Username
						</div>
						<small class="text-white-50">
							Secure Account
						</small>
					</div>

				</div>

			</div>

			<nav class="nav flex-column gap-2">

				<a href="/dashboard" class="nav-link sidebar-link">
					<i class="bi bi-speedometer2"></i>
					<span>Dashboard</span>
				</a>

				<a href="/vault" class="nav-link sidebar-link">
					<i class="bi bi-lock"></i>
					<span>Vault</span>
				</a>

				<a href="/generator" class="nav-link sidebar-link">
					<i class="bi bi-key"></i>
					<span>Generator</span>
				</a>

				<a href="/audit" class="nav-link sidebar-link">
					<i class="bi bi-shield-check"></i>
					<span>Audit</span>
				</a>

				<a href="/profile" class="nav-link sidebar-link">
					<i class="bi bi-person-circle"></i>
					<span>Profile</span>
				</a>

				<a href="/security-questions" class="nav-link sidebar-link">
					<i class="bi bi-shield-lock"></i>
					<span>Security Questions</span>
				</a>

				<a href="/settings" class="nav-link sidebar-link">
					<i class="bi bi-gear"></i>
					<span>Settings</span>
				</a>

			</nav>

		</div>

		<div class="mt-4">
			<hr class="border-light opacity-25 mb-3">
			<a href="/logout" class="nav-link sidebar-link logout-link">
				<i class="bi bi-box-arrow-right"></i>
				<span>Logout</span>
			</a>
		</div>

	</div>

</body>

</html>
