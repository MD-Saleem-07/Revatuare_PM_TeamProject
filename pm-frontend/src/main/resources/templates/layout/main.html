<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">

<head>
	<meta charset="UTF-8">
	<title>Revature Password Manager</title>

	<!-- Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

	<!-- Bootstrap Icons -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

	<style>
		body {
			font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
			background-color: #f4f6f9;
			margin: 0;
		}

		.main-wrapper {
			display: flex;
			min-height: 100vh;
		}

		.sidebar {
			width: 240px;
			color: #ffffff;
			padding: 0;
			flex-shrink: 0;
			min-height: 100vh;
		}

		.sidebar a {
			color: #e5e7eb;
			text-decoration: none;
			display: block;
			padding: 10px 12px;
			border-radius: 8px;
			transition: background 0.2s ease;
		}

		.sidebar a:hover {
			background-color: rgba(255, 255, 255, 0.08);
		}

		.content-area {
			flex-grow: 1;
			background: #f8f9fc;
			min-height: 100vh;
			overflow-x: auto;
		}

		.content-container {
			max-width: 1400px;
			margin: 0 auto;
			padding: 35px;
		}

		.card {
			border: none;
			border-radius: 18px;
			box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);
			transition: transform 0.2s ease, box-shadow 0.2s ease;
		}

		.card:hover {
			transform: translateY(-4px);
			box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
		}

		.btn {
			border-radius: 10px;
			font-weight: 500;
		}


		.table {
			border-radius: 14px;
			overflow: hidden;
		}

		.table thead {
			background-color: #f1f3f7;
		}

		.table th {
			font-weight: 600;
		}

		.table-hover tbody tr:hover {
			background-color: #f8f9fc;
		}


		.form-control,
		.form-select {
			border-radius: 10px;
		}

		.alert {
			border-radius: 12px;
			font-size: 14px;
		}


		@media (max-width: 992px) {

			.sidebar {
				width: 200px;
			}

			.content-container {
				padding: 20px;
			}
		}

		@media (max-width: 768px) {

			.main-wrapper {
				flex-direction: column;
			}

			.sidebar {
				width: 100%;
				min-height: auto;
			}
		}

		.sidebar-wrapper {
			background: rgb(0, 0, 64);
			min-height: 100vh;
			padding: 24px;
		}

		.sidebar-wrapper .user-card {
			overflow: hidden;
			background: rgba(255, 255, 255, 0.06);
		}

		.sidebar-wrapper .avatar-wrapper {
			position: relative;
		}

		.sidebar-wrapper .avatar-wrapper {
			position: relative;
			display: inline-block;
		}

		.sidebar-wrapper .avatar {
			width: 54px;
			height: 54px;
			border-radius: 50%;
			background: conic-gradient(from 0deg,
					#3b82f6,
					#2563eb,
					#1d4ed8,
					#3b82f6);
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 3px;
			transition: all 0.3s ease;
		}

		.sidebar-wrapper .avatar-letter-circle {
			width: 100%;
			height: 100%;
			border-radius: 50%;
			background: #111827;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.sidebar-wrapper .avatar-letter {
			font-size: 20px;
			font-weight: 700;
			color: #ffffff;
		}

		.sidebar-wrapper .avatar-wrapper:hover .avatar {
			transform: scale(1.08);
			box-shadow:
				0 0 20px rgba(59, 130, 246, 0.7);
		}

		.sidebar-wrapper .status-dot {
			position: absolute;
			bottom: 3px;
			right: 3px;
			width: 12px;
			height: 12px;
			background: #22c55e;
			border: 2px solid #1f2937;
			border-radius: 50%;
		}

		.sidebar-wrapper .username-text {
			font-size: 16px;
			font-weight: 600;
			color: #ffffff;
			max-width: 150px;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;

			display: block;
		}

		.sidebar-wrapper .sidebar-link {
			display: flex;
			align-items: center;
			gap: 12px;
			color: #e5e7eb;
			padding: 10px 14px;
			border-radius: 10px;
			font-weight: 500;
			transition: all 0.2s ease;
		}

		.sidebar-wrapper .sidebar-link i {
			font-size: 18px;
			width: 22px;
		}

		.sidebar-wrapper .sidebar-link:hover {
			background: rgba(255, 255, 255, 0.08);
			transform: translateX(4px);
			color: #ffffff;
		}

		.sidebar-wrapper .logout-link {
			color: #f87171;
		}

		.sidebar-wrapper .logout-link:hover {
			background: rgba(248, 113, 113, 0.15);
			color: #ffb4b4;
		}

		.custom-navbar {
			height: 60px;
			display: flex;
			align-items: center;
			background: rgb(0, 0, 34);
			border-bottom: 1px solid rgba(255, 255, 255, 0.05);
		}

		.brand-text {
			font-size: 20px;
			letter-spacing: 0.4px;
			color: #60a5fa;
		}

		.logout-btn {
			border: 1px solid rgba(255, 255, 255, 0.15);
			color: #e5e7eb;
			background: transparent;
			border-radius: 8px;
			padding: 6px 14px;
			transition: all 0.2s ease;
		}

		.logout-btn:hover {
			background: rgba(255, 255, 255, 0.08);
			color: #ffffff;
		}
	</style>
</head>

<body>


	<div th:replace="~{layout/navbar :: navbar}"></div>

	<div class="main-wrapper">


		<div class="sidebar">
			<div th:replace="~{layout/sidebar :: sidebar}"></div>
		</div>


		<div class="content-area">
			<div class="content-container">
				<div th:replace="${content}"></div>
			</div>
		</div>

	</div>


	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
