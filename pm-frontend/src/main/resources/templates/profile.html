<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/main :: layout(~{::section})}">

<section>

	<div th:if="${param.success}" class="alert alert-success alert-dismissible fade show">
		Profile updated successfully.
		<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
	</div>

	<div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show">
		Profile update failed.
		<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
	</div>

	<div class="d-flex justify-content-between align-items-center mb-4">
		<div>
			<h2 class="fw-bold mb-1">My Profile</h2>
			<p class="text-muted mb-0">
				Manage your account information and security settings
			</p>
		</div>

		<a href="/dashboard" class="btn btn-outline-secondary">
			<i class="bi bi-arrow-left"></i> Dashboard
		</a>
	</div>

	<div class="row g-4">

		<div class="col-lg-6">
			<div class="card border-0 shadow-sm p-4 h-100">

				<div class="text-center mb-4">
					<div class="rounded-circle bg-primary text-white d-inline-flex
                                align-items-center justify-content-center"
						style="width:90px;height:90px;font-size:40px;">
						<span th:text="${#strings.substring(profile.username,0,1).toUpperCase()}">
							U
						</span>
					</div>

					<h5 class="fw-bold mt-3 mb-0" th:text="${profile.username}">
					</h5>

					<small class="text-muted">
						Account Owner
					</small>
				</div>

				<hr>

				<form method="post" action="/profile/update" novalidate id="profileForm">

					<div class="mb-3">
						<label class="form-label fw-semibold">
							Username
						</label>

						<div class="profile-username-display" th:text="${profile.username}">
							username
						</div>
					</div>

					<div class="mb-3">
						<label class="form-label fw-semibold">
							Email Address
						</label>
						<input type="email" id="email" name="email" class="form-control" th:value="${profile.email}">

						<div class="text-danger small" id="emailError"></div>
					</div>

					<div class="mb-3">
						<label class="form-label fw-semibold">
							Phone Number
						</label>
						<input type="text" id="phoneNumber" name="phoneNumber" class="form-control"
							th:value="${profile.phoneNumber}">
						<div class="text-danger small" id="phoneError"></div>
					</div>

					<button class="btn btn-primary w-100">
						<i class="bi bi-check-circle me-1"></i>
						Update Profile
					</button>

				</form>

				<div class="mt-4 pt-3 border-top">
					<label class="fw-semibold d-block mb-2">
						Two-Factor Authentication
					</label>

					<span th:if="${profile.twoFactorEnabled}" class="badge bg-success px-3 py-2">
						<i class="bi bi-shield-check me-1"></i>
						Enabled
					</span>

					<span th:if="${!profile.twoFactorEnabled}" class="badge bg-danger px-3 py-2">
						<i class="bi bi-shield-x me-1"></i>
						Disabled
					</span>
				</div>

			</div>
		</div>

		<div class="col-lg-6">
			<div class="card border-0 shadow-sm p-4 h-100">

				<h5 class="fw-bold mb-4">
					Security Controls
				</h5>

				<div class="d-grid gap-3">

					<form th:if="${!profile.twoFactorEnabled}" method="post" action="/settings/enable2fa">
						<button class="btn btn-success w-100">
							<i class="bi bi-shield-lock me-1"></i>
							Enable Two-Factor Authentication
						</button>
					</form>

					<form th:if="${profile.twoFactorEnabled}" method="post" action="/settings/disable2fa">
						<button class="btn btn-danger w-100">
							<i class="bi bi-shield-x me-1"></i>
							Disable Two-Factor Authentication
						</button>
					</form>

					<a href="/settings" class="btn btn-outline-primary w-100">
						<i class="bi bi-gear me-1"></i>
						Account Settings
					</a>

				</div>

				<div class="mt-4 p-3 bg-light rounded">
					<small class="text-muted">
						Keep your email and phone updated to receive
						security alerts and OTP verifications.
					</small>
				</div>

			</div>
		</div>

	</div>

	<script>
		document.getElementById("profileForm")
			.addEventListener("submit", function (e) {

				let valid = true;

				// Clear previous errors
				document.getElementById("emailError").innerText = "";
				document.getElementById("phoneError").innerText = "";

				const email = document.getElementById("email");
				const phone = document.getElementById("phoneNumber");

				// Email validation
				if (email.value.trim() === "") {

					document.getElementById("emailError").innerText =
						"Email is required.";

					email.classList.add("is-invalid");
					valid = false;

				} else if (!/^[a-zA-Z0-9._%+-]+@gmail\.[a-zA-Z]{2,3}$/.test(email.value.trim())) {

					document.getElementById("emailError").innerText =
						"Email must be in format: example@gmail.xx (2 to 3 letters only after gmail.)";

					email.classList.add("is-invalid");
					valid = false;

				} else {

					document.getElementById("emailError").innerText = "";
					email.classList.remove("is-invalid");
				}
				// Phone validation
				if (phone.value.trim() === "") {

					document.getElementById("phoneError").innerText =
						"Phone number is required.";
					phone.classList.add("is-invalid");
					valid = false;

				} else if (!/^[6-9][0-9]{9}$/.test(phone.value.trim())) {

					document.getElementById("phoneError").innerText =
						"Phone number must be 10 digits and start with 6, 7, 8, or 9.";
					phone.classList.add("is-invalid");
					valid = false;

				} else {
					phone.classList.remove("is-invalid");
				}

				if (!valid) {
					e.preventDefault();
				}

			});
	</script>

</section>

</html>
