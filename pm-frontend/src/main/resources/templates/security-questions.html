<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/main :: layout(~{::section})}">

<section>

	<div class="d-flex justify-content-between align-items-center mb-4">
		<div>
			<h2 class="fw-bold mb-1">Security Questions</h2>
			<p class="text-muted mb-0">
				Update your recovery questions securely
			</p>
		</div>
	</div>

	<div class="card shadow-sm border-0 p-4">

		<div id="successBox" class="alert alert-success alert-dismissible fade show d-none">
			<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
		</div>

		<div id="errorBox" class="alert alert-danger alert-dismissible fade show d-none">
			<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
		</div>

		<div id="questionsContainer" class="mb-3"></div>

		<hr class="my-4">

		<div class="mb-4">
			<label class="fw-semibold">
				Confirm Master Password
			</label>

			<div class="input-group mt-2">
				<input type="password" id="confirmMaster" class="form-control" placeholder="Enter master password"
					required>

				<button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
					<i class="bi bi-eye"></i>
				</button>
			</div>

			<small class="text-muted">
				Required to verify your identity before updating questions.
			</small>
		</div>

		<button class="btn btn-primary w-100" onclick="updateSecurityQuestions()">
			<i class="bi bi-shield-check me-1"></i>
			Update Security Questions
		</button>

	</div>

	<script>

		document.addEventListener("DOMContentLoaded", loadQuestions);

		function loadQuestions() {

			fetch("/security-questions/api")
				.then(res => {
					if (!res.ok) throw new Error("Failed to load questions");
					return res.json();
				})
				.then(data => {

					const container = document.getElementById("questionsContainer");
					container.innerHTML = "";

					data.forEach((q, index) => {

						container.innerHTML += `
                            <div class="mb-4 p-3 border rounded bg-light">
                                <label class="fw-semibold">${q.question}</label>
                                <input type="text"
                                       class="form-control mt-2"
                                       id="answer${index}"
                                       placeholder="Enter new answer"
                                       required>
                            </div>
                        `;
					});

				})
				.catch(err => showError(err.message));
		}

		function updateSecurityQuestions() {

			hideError();

			const masterPassword =
				document.getElementById("confirmMaster").value.trim();

			if (!masterPassword) {
				showError("Master password is required.");
				return;
			}

			const answers = [];

			document.querySelectorAll("#questionsContainer input")
				.forEach(input => {
					answers.push({
						answer: input.value.trim()
					});
				});

			if (answers.some(a => !a.answer)) {
				showError("All answers are required.");
				return;
			}

			fetch("/security-questions/api?masterPassword=" + masterPassword, {
				method: "PUT",
				headers: {
					"Content-Type": "application/json"
				},
				body: JSON.stringify(answers)
			})
				.then(res => {
					if (!res.ok) throw new Error("Invalid master password.");
					return res.text();
				})
				.then(msg => {
					showSuccess("Security questions updated successfully!");
					document.getElementById("confirmMaster").value = "";
				})
				.catch(err => showError(err.message));
		}

		function togglePassword() {
			const input = document.getElementById("confirmMaster");
			input.type = input.type === "password" ? "text" : "password";
		}

		function showSuccess(msg) {
			const box = document.getElementById("successBox");
			box.innerText = msg;
			box.classList.remove("d-none");

			setTimeout(() => {
				box.classList.add("d-none");
			}, 3000);
		}

		function showError(msg) {
			const box = document.getElementById("errorBox");
			box.innerText = msg;
			box.classList.remove("d-none");
		}

		function hideError() {
			document.getElementById("errorBox").classList.add("d-none");
		}

	</script>

</section>

</html>
